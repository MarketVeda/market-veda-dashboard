name: dashboard

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'NSE Symbol  e.g. CGPOWER  RELIANCE  HDFCBANK  TITAN'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests --quiet

      - name: Generate dashboard
        run: |
          DATE=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          python build.py "${{ github.event.inputs.symbol }}"
          echo "DATE=${DATE}" >> $GITHUB_ENV
          echo "FNAME=${{ github.event.inputs.symbol }}_${DATE}.html" >> $GITHUB_ENV

      - name: Publish to GitHub Pages
        run: |
          git config user.name "MarketVeda Bot"
          git config user.email "bot@marketveda.in"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . --quiet 2>/dev/null || true
          FNAME="${{ github.event.inputs.symbol }}_${{ env.DATE }}.html"
          git checkout ${{ github.sha }} -- "$FNAME" 2>/dev/null || \
            cp "/home/runner/work/market-veda-dashboard/market-veda-dashboard/$FNAME" .
          python3 -c "
          import os,glob
          files=sorted(glob.glob('*.html'),reverse=True)
          files=[f for f in files if f!='index.html'][:30]
          rows=''.join(f'<tr><td><a href=\"{f}\">{f}</a></td></tr>' for f in files)
          html=f'''<!DOCTYPE html><html><head><meta charset=\"UTF-8\">
          <title>MarketVeda Dashboards</title>
          <style>body{{font-family:sans-serif;background:#070B14;color:#C9D1D9;padding:30px}}
          h1{{color:#00E87A;margin-bottom:20px}}table{{border-collapse:collapse;width:100%}}
          td{{padding:10px;border-bottom:1px solid #161B22}}a{{color:#00E87A;text-decoration:none}}
          a:hover{{text-decoration:underline}}</style></head>
          <body><h1>📊 MarketVeda Dashboards</h1>
          <p style=\"color:#555;margin-bottom:20px\">Click any dashboard to open directly in browser</p>
          <table>{rows}</table></body></html>'''
          open('index.html','w').write(html)
          "
          git add *.html
          git commit -m "Dashboard: ${{ env.FNAME }}" || echo "Nothing to commit"
          git push origin gh-pages --force

      - name: Summary
        run: |
          URL="https://marketveda.github.io/market-veda-dashboard/${{ env.FNAME }}"
          INDEX="https://marketveda.github.io/market-veda-dashboard/"
          echo "## ✅ MarketVeda Dashboard Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Symbol:** ${{ github.event.inputs.symbol }} | **Date:** ${{ env.DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Open Dashboard Directly" >> $GITHUB_STEP_SUMMARY
          echo "[$URL]($URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **All dashboards:** [$INDEX]($INDEX)" >> $GITHUB_STEP_SUMMARY
